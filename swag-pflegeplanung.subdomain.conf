## Pflegeplanung - SWAG Reverse Proxy Config
## Kopiere diese Datei nach: /mnt/user/appdata/swag/nginx/proxy-confs/

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name pflegeplanung.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 10M;

    # Passwortschutz (optional, aber empfohlen)
    # Erstelle .htpasswd mit: docker exec -it swag htpasswd -c /config/nginx/.htpasswd USERNAME
    auth_basic "Pflegeplanung Login";
    auth_basic_user_file /config/nginx/.htpasswd;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app pflegeplanung;
        set $upstream_port 5000;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # Timeout für lange Planungsberechnungen
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
