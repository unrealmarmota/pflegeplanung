{% extends "base.html" %}

{% block title %}Neuer Feiertag - Pflegeplanung{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('feiertage.index') }}">Feiertage</a></li>
                <li class="breadcrumb-item active">Neu</li>
            </ol>
        </nav>
        <h1><i class="bi bi-calendar-plus"></i> Neuer Feiertag</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="datum" class="form-label required">Datum</label>
                        <input type="date" class="form-control" id="datum" name="datum" required>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label required">Name</label>
                        <input type="text" class="form-control" id="name" name="name" required
                               placeholder="z.B. Heiligabend">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Speichern
                        </button>
                        <a href="{{ url_for('feiertage.index') }}" class="btn btn-secondary">Abbrechen</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
