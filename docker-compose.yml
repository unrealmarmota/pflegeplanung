services:
  pflegeplanung:
    build: .
    container_name: pflegeplanung
    restart: unless-stopped

    volumes:
      # Datenbank persistent speichern
      - ./pflegeplanung.db:/app/pflegeplanung.db

    environment:
      - FLASK_ENV=production
      - SECRET_KEY=aendere-mich-auf-einen-langen-zufalls-string
      # Optional: KI-Erklärungen (alternativ über Web-UI konfigurierbar)
      # - CLAUDE_API_KEY=sk-ant-...

    ports:
      - "9500:5000"
